services:
  - type: web
    name: lom-sales-hub
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: LOMHub
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: lom-sales-hub-db
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: lom-sales-hub-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_ENCRYPT
        value: "true"
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: FORCE_HTTPS
        value: "true"
      - key: TRUSTED_PROXIES
        value: "*"
      - key: REGISTRATION_ENABLED
        value: "false"
      - key: KOT_MOCK_ENDPOINT_ENABLED
        value: "false"
      - key: RUN_MIGRATIONS
        value: "true"
      - key: RUN_SEEDERS
        value: "false"

databases:
  - name: lom-sales-hub-db
    plan: free
    databaseName: lom_sales_hub
    user: lom_sales_hub
